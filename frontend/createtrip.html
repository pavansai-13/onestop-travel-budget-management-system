<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Trip | Onestop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
if (!localStorage.getItem("token")) {
  window.location.replace("login.html");
}
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#2563eb);
  display:flex;
  flex-direction:column;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:22px;
  font-weight:600;
}

.back{
  color:#facc15;
  text-decoration:none;
  font-weight:500;
}

/* MAIN */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* FORM CARD */
.form-card{
  background:rgba(255,255,255,0.1);
  padding:35px;
  border-radius:20px;
  width:100%;
  max-width:550px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  backdrop-filter:blur(15px);
}

.form-card h2{
  margin-bottom:25px;
  text-align:center;
}

/* ROW */
.row{
  display:flex;
  gap:15px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

.row input{
  flex:1;
  padding:12px 14px;
  border-radius:10px;
  border:none;
  font-size:14px;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#f59e0b,#f97316);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media(max-width:500px){
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">Onestop</div>
  <a href="dashboard.html" class="back">← Dashboard</a>
</nav>

<main class="container">
  <div class="form-card">
    <h2>✈️ Create New Trip</h2>

    <form id="tripForm">

      <div class="row">
        <input type="text" id="tripName" placeholder="Trip Name" required>
      </div>

      <div class="row">
        <input type="text" id="source" placeholder="From (City)" required>
        <input type="text" id="destination" placeholder="Destination (City)" required>
      </div>

      <div class="row">
        <input type="date" id="startDate" required>
        <input type="date" id="endDate" required>
      </div>

      <button type="submit">Create Trip</button>

    </form>
  </div>
</main>

<script>
const form = document.getElementById("tripForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const token = localStorage.getItem("token");

  const data = {
    tripName: document.getElementById("tripName").value,
    source: document.getElementById("source").value,
    destination: document.getElementById("destination").value,
    startDate: document.getElementById("startDate").value,
    endDate: document.getElementById("endDate").value
  };

  const res = await fetch("http://localhost:5000/api/trips", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.success) {
    window.location.href = "dashboard.html";
  } else {
    alert(result.message || "Trip creation failed");
  }
});
</script>

</body>
</html>
