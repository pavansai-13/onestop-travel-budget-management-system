<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Onestop - Travel Budget Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563eb, #1e293b);
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            padding: 60px 50px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 400px;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 16px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            background: white;
            color: #1e293b;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .secondary {
            background: #f59e0b;
            color: white;
        }

        .secondary:hover {
            background: #d97706;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 40px 25px;
            }

            h1 {
                font-size: 30px;
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Onestop</h1>
    <p class="tagline">Plan Smart. Travel Better.</p>

    <div class="buttons">
        <a href="login.html" class="btn">Login</a>
        <a href="signup.html" class="btn secondary">Sign Up</a>
    </div>
</div>

</body>
</html>
