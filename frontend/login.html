<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Onestop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #2563eb, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-container {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(15px);
      padding: 45px 35px;
      border-radius: 18px;
      width: 360px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      margin-bottom: 5px;
      font-size: 26px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 11px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      box-shadow: 0 0 0 2px #f59e0b;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #f59e0b;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    .switch {
      margin-top: 18px;
      font-size: 14px;
    }

    .switch a {
      color: #f59e0b;
      text-decoration: none;
      font-weight: 500;
    }

    .switch a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width: 420px){
      .auth-container{
        width:90%;
        padding:35px 20px;
      }
    }
  </style>
</head>

<body>

<div class="auth-container">
  <h2>Welcome Back 👋</h2>
  <p class="subtitle">Login to continue planning your trips</p>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email address" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p class="switch">
    Don’t have an account?
    <a href="signup.html">Sign Up</a>
  </p>
</div>

<script>
const API_BASE = "https://onestop-travel-budget-management-system-1.onrender.com";
const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(`${API_BASE}/api/auth/login`), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      alert("Login successful ✅");
      window.location.href = "dashboard.html";
    } else {
      alert(data.message || "Login failed ❌");
    }

  } catch (err) {
    alert("Backend not running ❌");
  }
});
</script>

</body>
</html>
