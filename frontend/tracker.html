<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Expense Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e40af);
min-height:100vh;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
width:800px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

/* Budget box */

.budget-box{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:12px;
margin-bottom:20px;
text-align:center;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.2);
color:white;
font-size:14px;
outline:none;
}

input::placeholder{
color:#e5e7eb;
}

/* Buttons */

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
display:block;
margin:10px auto;
}

button:hover{
background:#16a34a;
}

/* Layout */

.main-layout{
display:flex;
gap:25px;
margin-top:20px;
align-items:flex-start;
}

.expense-section{
flex:1;
}

.chart-section{
width:260px;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
}

.chart-section canvas{
width:100%!important;
}

/* Expense cards */

.expense-item{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.15);
padding:12px;
border-radius:10px;
margin-bottom:10px;
position:relative;
}

.expense-left{
display:flex;
flex-direction:column;
}

/* menu */

.menu-btn{
cursor:pointer;
font-size:20px;
padding:5px;
}

.dropdown{
display:none;
position:absolute;
right:10px;
top:35px;
background:white;
color:black;
border-radius:6px;
overflow:hidden;
}

.dropdown div{
padding:8px 12px;
cursor:pointer;
}

.dropdown div:hover{
background:#f3f4f6;
}

/* Summary box */

.summary{
margin-top:20px;
padding:18px;
border-radius:12px;
text-align:center;
font-weight:600;
}

.safe{background:#16a34a;}
.warning{background:#f59e0b;}
.danger{background:#dc2626;}

@media(max-width:700px){

.container{
width:100%;
}

.main-layout{
flex-direction:column;
}

.chart-section{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Expense Tracker</h2>

<div class="budget-box">

<p>Estimated Budget: ₹ <span id="estimatedBudget">0</span></p>

</div>

<input type="text" id="expenseTitle" placeholder="Expense Title (Food, Hotel, Travel)">
<input type="number" id="expenseAmount" placeholder="Amount">

<button onclick="addExpense()">Add Expense</button>

<div class="main-layout">

<div class="expense-section">

<div id="expenseList"></div>

<div class="summary safe" id="summaryBox">
Total Expense: ₹ 0
</div>

</div>

<div class="chart-section">
<canvas id="expenseChart"></canvas>
</div>

</div>

</div>

<script>
const API_BASE = "http://localhost:5000";

const token = localStorage.getItem("token");
const tripId = localStorage.getItem("selectedTripId");

if (!token) {
  alert("Login required");
  window.location.href = "login.html";
}

if (!tripId) {
  alert("Trip not selected");
  window.location.href = "dashboard.html";
}

let estimatedBudget = 0;
let totalExpense = 0;
let expenses = [];
let chart;

/* LOAD EXPENSES */
async function loadExpenses() {
  try {
    const res = await fetch(`${API_BASE}/api/trip-details/${tripId}/expenses`, {
      headers: { Authorization: "Bearer " + token }
    });

    const data = await res.json();

    if (!data.success) {
      alert("Failed to load expenses");
      return;
    }

    expenses = data.expenses || [];
    totalExpense = data.spentAmount || 0;
    estimatedBudget = data.estimatedBudget || 0;

    document.getElementById("estimatedBudget").innerText = estimatedBudget;

    renderExpenses();
    compareBudget();
    updateChart();

  } catch (err) {
    alert("Server error ❌");
  }
}

/* ADD EXPENSE */
async function addExpense() {
  const title = document.getElementById("expenseTitle").value.trim();
  const amount = parseFloat(document.getElementById("expenseAmount").value);

  if (!title || isNaN(amount) || amount <= 0) {
    alert("Enter valid expense");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/trip-details/${tripId}/add-expense`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ title, amount })
    });

    const data = await res.json();

    if (!data.success) {
      alert("Failed to add expense");
      return;
    }

    expenses = data.expenses;
    totalExpense = data.spentAmount;

    renderExpenses();
    compareBudget();
    updateChart();

    document.getElementById("expenseTitle").value = "";
    document.getElementById("expenseAmount").value = "";

  } catch (err) {
    alert("Server error ❌");
  }
}

/* RENDER */
function renderExpenses() {
  const list = document.getElementById("expenseList");
  list.innerHTML = "";

  expenses.forEach(exp => {
    const div = document.createElement("div");
    div.className = "expense-item";

    div.innerHTML = `
      <div class="expense-left">
        <span>${exp.title}</span>
        <span>₹ ${exp.amount}</span>
      </div>
    `;

    list.appendChild(div);
  });
}

/* BUDGET */
function compareBudget() {
  const summary = document.getElementById("summaryBox");

  summary.innerHTML = `Total Expense: ₹ ${totalExpense}`;

  if (!estimatedBudget || estimatedBudget <= 0) {
    summary.className = "summary warning";
    summary.innerHTML += "<br>⚠ No Estimated Budget";
    return;
  }

  const percent = (totalExpense / estimatedBudget) * 100;

  if (totalExpense > estimatedBudget) {
    summary.className = "summary danger";
    summary.innerHTML += "<br>⚠ Over Budget";
  } else if (percent >= 80) {
    summary.className = "summary warning";
    summary.innerHTML += "<br>⚠ Budget Almost Finished";
  } else {
    summary.className = "summary safe";
    summary.innerHTML += "<br>✅ Within Budget";
  }
}

/* CHART */
function updateChart() {
  const categories = {};

  expenses.forEach(exp => {
    const key = exp.title.toLowerCase();
    if (!categories[key]) categories[key] = 0;
    categories[key] += exp.amount;
  });

  const labels = Object.keys(categories);
  const values = Object.values(categories);

  if (chart) chart.destroy();

  const ctx = document.getElementById("expenseChart");

  chart = new Chart(ctx, {
    type: "pie",
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: [
          "#22c55e",
          "#3b82f6",
          "#f59e0b",
          "#ef4444",
          "#a855f7",
          "#14b8a6"
        ]
      }]
    }
  });
}

loadExpenses();
</script>

</body>
</html>
