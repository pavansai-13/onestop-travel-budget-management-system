<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | Onestop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
background:linear-gradient(135deg,#2563eb,#1e293b);
display:flex;justify-content:center;align-items:center;
}

.auth-container{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:45px 35px;
border-radius:18px;
width:360px;
text-align:center;
color:white;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

h2{margin-bottom:5px;}
.subtitle{font-size:14px;opacity:0.85;margin-bottom:25px;}

form{display:flex;flex-direction:column;gap:12px;}

input{
padding:11px;border-radius:8px;border:none;outline:none;
}

button{
margin-top:10px;padding:12px;border-radius:10px;
border:none;background:#f59e0b;color:white;
cursor:pointer;
}

button:hover{background:#d97706;}

.switch{margin-top:18px;font-size:14px;}
.switch a{color:#f59e0b;text-decoration:none;}
</style>
</head>

<body>

<div class="auth-container">
<h2>Create Account</h2>
<p class="subtitle">Join Onestop and plan better trips</p>

<form id="signupForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email address" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>
<button type="submit">Sign Up</button>
</form>

<p class="switch">
Already have an account?
<a href="login.html">Login</a>
</p>
</div>

<script>
const signupForm = document.getElementById("signupForm");

signupForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if(password !== confirmPassword){
    alert("Passwords do not match ❌");
    return;
  }

  if(password.length < 6){
    alert("Password must be at least 6 characters ❌");
    return;
  }

  const btn = signupForm.querySelector("button");
  btn.innerText = "Creating...";
  btn.disabled = true;

  try{
    const res = await fetch("http://localhost:5000/api/auth/signup",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ name,email,password })
    });

    const data = await res.json();

    if(res.ok){
      // ✅ SAVE USER + TOKEN
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));

      alert("Signup successful ✅");
      window.location.href = "dashboard.html";
    }else{
      alert(data.message);
    }

  }catch(err){
    alert("Server error ❌ Backend not running");
  }

  btn.innerText = "Sign Up";
  btn.disabled = false;
});
</script>

</body>
</html>
