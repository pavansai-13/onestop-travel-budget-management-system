<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | Onestop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:linear-gradient(135deg,#1e293b,#2563eb);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Card */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px 30px;
border-radius:20px;
text-align:center;
width:350px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* Avatar */
.avatar{
width:90px;
height:90px;
border-radius:50%;
background:#f59e0b;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
font-weight:600;
margin:0 auto 15px;
}

/* Text */
h2{margin-bottom:10px;}

.info{
margin-top:15px;
text-align:left;
}

.info input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

/* Buttons */
.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.edit-btn{background:#3b82f6;color:white;}
.save-btn{background:#22c55e;color:white;}
.logout-btn{background:#ef4444;color:white;}
.back-btn{background:#f59e0b;color:white;}

button:hover{transform:translateY(-2px);}
</style>
</head>

<body>

<div class="card">

<div class="avatar" id="avatar">U</div>

<h2 id="welcome"></h2>

<div class="info">
<input type="text" id="name" disabled>
<input type="email" id="email" disabled>
</div>

<div class="actions">
<button class="back-btn" onclick="goBack()">Dashboard</button>
<button class="edit-btn" id="editBtn" onclick="toggleEdit()">Edit</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>

<script>
let isEditing = false;

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.replace("login.html");
}

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");

// Load data
nameInput.value = user.name;
emailInput.value = user.email;

document.getElementById("welcome").innerText = `Hey, ${user.name} 👋`;
document.getElementById("avatar").innerText = user.name.charAt(0).toUpperCase();

function toggleEdit(){
  const btn = document.getElementById("editBtn");

  if(!isEditing){
    // Enable editing
    nameInput.disabled = false;
    emailInput.disabled = false;
    btn.innerText = "Save";
    btn.classList.remove("edit-btn");
    btn.classList.add("save-btn");
    isEditing = true;
  } else {
    // Save changes
    const updatedUser = {
      ...user,
      name: nameInput.value.trim(),
      email: emailInput.value.trim()
    };

    localStorage.setItem("user", JSON.stringify(updatedUser));

    alert("Profile updated ✅");

    // Disable again
    nameInput.disabled = true;
    emailInput.disabled = true;

    btn.innerText = "Edit";
    btn.classList.remove("save-btn");
    btn.classList.add("edit-btn");

    isEditing = false;

    // Update UI
    document.getElementById("welcome").innerText =
      `Hey, ${updatedUser.name} 👋`;

    document.getElementById("avatar").innerText =
      updatedUser.name.charAt(0).toUpperCase();
  }
}

function goBack(){
  window.location.href = "dashboard.html";
}

function logout(){
  localStorage.clear();
  window.location.replace("login.html");
}
</script>

</body>
</html>
